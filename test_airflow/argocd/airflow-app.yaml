apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/abhijith-s-2002/test
    targetRevision: HEAD
    path: airflow
    helm:
      valueFiles:
        - values.yaml

  destination:ß
    server: https://kubernetes.default.svc
    namespace: airflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true